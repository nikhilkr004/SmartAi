services:
  - type: web
    name: studyai-backend
    runtime: python
    plan: starter
    region: singapore
    rootDir: backend_python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
